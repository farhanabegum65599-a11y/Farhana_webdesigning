
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Information Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" 
     href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
     <style>
        i
        {
            color: blueviolet;

        }
        label{
          color: rgb(133, 131, 165);  
        }  
        div{
            color: rgb(179, 143, 182);
        }

        
     </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <i class="fa-solid fa-circle-user"></i>
            <h2>Personal Information</h2>
            <p>Please fill in the details below</p>
        </div>
        <form action="first.html" method="get" class="form">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="Name" name="Name" placeholder="Name" required><br><br>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="Email" name="Email" placeholder="Email" required><br><br>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="Password" required><br><br>
            </div>
             <div class="input-group gender-group">
                <label>Gender:</label><br>

                <label class="radio-label">
                    <input type="radio" name="gender" value="Female">
                    <i class="fa-solid fa-venus"></i>

Female
</label>
<label class="radio-label">
    <input type="radio" name="gender" value="Male">
    <i class="fa-solid fa-mars"></i>
    Male
</label><br>


</label>
                </label>
             </div>
             <div class="input-group course-group">
                <label>Course:</label><br>
                <label class="checkbox-label">
                    <input type="checkbox" name="Course" value="Java">
                    <i class="fab fa-java"></i>
Java
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="Course" value="HTML">
                    <i class="fa-brands fa-html5"></i>
 HTML 
                </label><br><br>                
             </div>
             <div class="form-action">
                <button type="submit" class="btn submit">
                    <i class="fa-solid fa-paper-plane"></i>
 submit                   
                </button>
                <button type="reset" class="btn reset">
                    <i class="fa-solid fa-trash-undo"></i>
 reset                   
                </button>

             </div>




        </form>
    </div>
    
</body>
</html>
